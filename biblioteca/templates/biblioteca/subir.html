{% extends 'biblioteca/base.html' %}

{% block title %}Subir Capítulo{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card bg-dark border-secondary shadow-lg mt-4">
            <div class="card-header border-secondary bg-black">
                <h3 class="text-primary m-0">🛠️ Subir Nuevo Capítulo</h3>
            </div>
            <div class="card-body">
                
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3 text-light">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}
                                <div class="form-text text-secondary">{{ field.help_text }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Procesar e Inyectar Capítulo</button>
                    </div>
                </form>

            </div>
        </div>
        <div class="text-center mt-3">
            <a href="{% url 'inicio' %}" class="text-secondary text-decoration-none">&larr; Cancelar y volver al inicio</a>
        </div>
    </div>
</div>
{% endblock %}
