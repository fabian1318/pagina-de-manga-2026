{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leyendo: {{ capitulo }}</title>
    <link rel="stylesheet" href="{% static 'css/lector.css' %}">
</head>
<body>

    <nav class="lector-nav">
        <a href="{% url 'detalle_manga' capitulo.manga.id %}">← Volver al Manga</a>
        
        <h1>
            {{ capitulo.manga.titulo }} - 
            {% if capitulo.tomo %}Tomo {{ capitulo.tomo }} | {% endif %}
            Cap. {{ capitulo.numero }}
        </h1>
        
        <a href="{% url 'inicio' %}">🏠 Inicio</a>
    </nav>

    <main class="contenedor-paginas">
        {% for pagina in paginas %}
            <img src="{{ pagina.imagen.url }}" alt="Página {{ pagina.numero }}" loading="lazy">
        {% empty %}
            <p style="color: white; margin-top: 50px;">Aún no hay páginas subidas para este capítulo.</p>
        {% endfor %}
    </main>

</body>
</html>
