{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

    <div class="login-container">
        <h2>Acceso GEAR</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="input-group">
                <label for="{{ form.username.id_for_label }}">Identificador</label>
                {{ form.username }}
            </div>
            
            <div class="input-group">
                <label for="{{ form.password.id_for_label }}">Clave de acceso</label>
                {{ form.password }}
            </div>
            
            <button type="submit">Autenticar</button>
        </form>
    </div>

</body>
</html>
